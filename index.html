<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Farm4Glass Academy</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="logo">
      Farm4Glass
    </div>

    <button onclick="showTab('dashboard')">
      Dashboard
    </button>

    <button onclick="showTab('courses')">
      Courses
    </button>

    <button onclick="showTab('profile')">
      Profile
    </button>

    <div class="sidebar-footer">

      <div class="sidebar-stat">
        🔥 14 Day Streak
      </div>

      <div class="sidebar-stat">
        🌾 420 XP
      </div>

    </div>

  </div>

  <!-- MAIN CONTENT -->

<div class="main">

    <button id="googleLogin">
      Sign in with Google
    </button>

    <div id="userInfo"></div>
  
    <!-- DASHBOARD -->
<div id="dashboard">

  <div class="hero">

    <h1>
      Farm4Glass Academy
    </h1>

    <p>
      Build competitive DECA skills through structured learning paths.
    </p>

  </div>

  <div class="stats-grid">

    <div class="stat-card">
      <div class="stat-label">
        XP
      </div>

      <div class="stat-value">
        0
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">
        Current Level
      </div>

      <div class="stat-value">
        1
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">
        Streak
      </div>

      <div class="stat-value">
        0
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">
        Lessons Completed
      </div>

      <div class="stat-value">
        0
      </div>
    </div>

  </div>

  <div class="level-card">

    <h2>
      Level Progress
    </h2>

    <p>
      0 / 100 XP
    </p>

    <div class="progress">
      <div
        class="progress-fill"
        style="width:0%">
      </div>
    </div>

  </div>

  <h2 class="section-title">
    Continue Learning
  </h2>

  <div id="featuredCourses"></div>

</div>

    <!-- COURSES PAGE -->

    <div id="courses" class="hidden">

      <h1>
        Courses
      </h1>

      <div id="course-list"></div>

    </div>

    <!-- PROFILE PAGE -->

    <div id="profile" class="hidden">

      <h1>
        Profile
      </h1>

      <div class="profile-card">

        <h2>
          Farm4Glass Learner
        </h2>

        <p>
          XP: 420
        </p>

        <p>
          Streak: 14 Days
        </p>

        <p>
          Rank: Level 7
        </p>

      </div>

    </div>

  </div>

<script type="module" src="script.js"></script>
  
</body>

</html>
